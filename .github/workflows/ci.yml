name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck
        env:
          # Fake env vars — unit tests are fully mocked and never hit real services
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: fake-service-role-key
          ADMIN_PASSWORD: fake-admin-password
          OWNER_USER_ID: 00000000-0000-0000-0000-000000000000

      - name: Run unit tests
        run: pnpm test
        env:
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: fake-service-role-key
          ADMIN_PASSWORD: fake-admin-password
          OWNER_USER_ID: 00000000-0000-0000-0000-000000000000

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter @daio/backend build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          OWNER_USER_ID: ${{ secrets.OWNER_USER_ID }}

      - name: Start backend server
        run: |
          pnpm --filter @daio/backend start > /tmp/server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          OWNER_USER_ID: ${{ secrets.OWNER_USER_ID }}
          SKIP_ORPHAN_RESUME: "true"

      - name: Wait for server health
        run: npx wait-on http://localhost:3001/api/health --timeout 30000

      - name: Run integration tests
        run: pnpm --filter @daio/backend test:integration
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: /tmp/server.log
